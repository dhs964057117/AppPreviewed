<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 1. 基础 SEO 优化 (TDK: Title, Description, Keywords) -->
    <!-- 建议：将 AppPreviewed 替换为你的真实品牌名或更吸引人的短语 -->
    <title>AppPreviewed - Create Stunning App Store & Google Play Mockups</title>
    <meta name="title" content="AppPreviewed - Create Stunning App Store & Google Play Mockups" />
    <meta name="description" content="Easily design and generate high-converting screenshots and mockups for your App Store and Google Play listings. Free, fast, and beautiful." />
    <meta name="keywords" content="app mockup generator, app store screenshots, google play screenshots, app preview, screenshot maker, iOS mockups, Android mockups" />
    <meta name="author" content="AppPreviewed" />

    <!-- 搜索引擎爬虫指令 -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- 规范网址 (Canonical URL) - 请将 href 替换为你的实际上线域名 -->
    <link rel="canonical" href="https://preview.suanss.com/" />

    <!-- 2. Open Graph / Facebook (用于社交媒体分享优化) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://preview.suanss.com/" />
    <meta property="og:title" content="AppPreviewed - Create Stunning App Store Mockups" />
    <meta property="og:description" content="Easily design and generate high-converting screenshots and mockups for your App Store and Google Play listings." />
    <meta property="og:image" content="https://preview.suanss.com/preview.png" /> <!-- 建议替换为一张 1200x630 的真实应用预览图 URL -->

    <!-- 3. Twitter Cards (用于 Twitter 分享优化) -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://preview.suanss.com/" />
    <meta property="twitter:title" content="AppPreviewed - Create Stunning App Store Mockups" />
    <meta property="twitter:description" content="Easily design and generate high-converting screenshots and mockups for your App Store and Google Play listings." />
    <meta property="twitter:image" content="https://preview.suanss.com/preview.png" /> <!-- 建议替换为真实的预览图 -->

    <!-- 4. Google AdSense 广告脚本 -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1351402912518551"
     crossorigin="anonymous"></script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
